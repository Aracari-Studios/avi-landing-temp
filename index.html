<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVI – Contáctanos</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding: 40px 32px;
    }

    .logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
    }

    .label {
      font-size: 1rem;
      color: #444;
      max-width: 240px;
      line-height: 1.5;
    }

    .label strong {
      color: #111;
    }

    .wa-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      background: #25D366;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 100px;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(37, 211, 102, 0.35);
    }

    .wa-link:hover {
      background: #1ebe5d;
      transform: scale(1.04);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
    }

    .wa-link svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .ms-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      background: #0099FF;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 100px;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(0, 153, 255, 0.35);
    }

    .ms-link:hover {
      background: #007de0;
      transform: scale(1.04);
      box-shadow: 0 6px 20px rgba(0, 153, 255, 0.5);
    }

    .ms-link img {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
  </style>
</head>

  <div class="card">
